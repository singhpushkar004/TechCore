<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TechCore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="./styles_robotics.css">
</head>
<body>
<div class="page-transition"></div>
<div class="toast-container-luxury" id="toast-container"></div>

<div class="auth-page">
  <!-- Animated bg glows -->
  <div class="auth-bg-glow" style="top:-10%;left:-10%;"></div>
  <div class="auth-bg-glow" style="bottom:-10%;right:-10%;animation-delay:4s;"></div>
  <!-- Circuit lines decoration -->
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <a href="index.html" class="nav-brand" style="justify-content:center;margin-bottom:6px;">
        <div class="nav-brand-logo"><i class="bi bi-cpu-fill"></i></div>
        <div><div class="nav-brand-text">TechCore</div><div class="nav-brand-tagline">Robotics &amp; Electronics</div></div>
      </a>
    </div>

    <div class="auth-title">Welcome Back</div>
    <div class="auth-subtitle">// LOGIN TO YOUR ACCOUNT</div>

    <!-- Social Login -->
    <a href="#" class="social-login-btn"><i class="bi bi-google" style="color:#ea4335;font-size:1rem;"></i> Continue with Google</a>
    <a href="#" class="social-login-btn"><i class="bi bi-github" style="font-size:1rem;"></i> Continue with GitHub</a>

    <div class="auth-divider"><span>or login with email</span></div>

    <!-- Form -->
    <div class="form-group-luxury">
      <label class="label-luxury">Email Address</label>
      <input type="email" class="input-luxury" placeholder="arjun@email.com">
    </div>
    <div class="form-group-luxury">
      <label class="label-luxury">Password</label>
      <div class="input-group-luxury">
        <input type="password" class="input-luxury" id="loginPass" placeholder="••••••••">
        <button class="input-eye-toggle" onclick="togglePass('loginPass',this)"><i class="bi bi-eye"></i></button>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.88rem;color:var(--text-secondary);">
        <input type="checkbox" style="accent-color:var(--accent-primary);"> Remember me
      </label>
      <a href="#" style="font-size:0.8rem;color:var(--accent-primary);font-family:'Space Mono',monospace;">Forgot password?</a>
    </div>

    <button class="btn-luxury w-100" style="justify-content:center;margin-bottom:18px;" onclick="window.location='index.html'">
      <i class="bi bi-box-arrow-in-right"></i> Login
    </button>

    <p style="text-align:center;font-size:0.85rem;color:var(--text-muted);font-family:'Rajdhani',sans-serif;margin:0;">
      Don't have an account? <a href="register.html" style="color:var(--accent-primary);font-weight:600;">Register here</a>
    </p>

    <!-- Security note -->
    <div style="margin-top:20px;padding:12px;background:var(--bg-secondary);border:1px solid var(--border-color);display:flex;align-items:center;gap:10px;">
      <i class="bi bi-shield-lock-fill" style="color:var(--accent-primary);font-size:1rem;"></i>
      <div style="font-size:0.75rem;color:var(--text-muted);font-family:'Space Mono',monospace;">256-bit SSL encrypted. Your data is safe.</div>
    </div>
  </div>
</div>

<script>
function togglePass(id, btn) {
  const f = document.getElementById(id);
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}
</script>
<div class="theme-toggle" style="position:fixed;bottom:20px;right:20px;z-index:99;"><button class="theme-btn" data-theme="dark">🌙</button><button class="theme-btn" data-theme="light">☀️</button><button class="theme-btn" data-theme="midnight">💠</button></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
